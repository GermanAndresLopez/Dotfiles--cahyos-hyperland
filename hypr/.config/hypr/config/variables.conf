$mainMod = SUPER
$terminal = kitty
input {
    kb_layout = us
    follow_mouse = 1

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
        scroll_factor = 0.5
    }

    sensitivity = 0.2
    accel_profile = adaptive
}
