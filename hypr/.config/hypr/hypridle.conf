# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━#

general {
    lock_cmd = quickshell -p ~/.config/hypr/scripts/quickshell/Lock.qml
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# 30s → baja brillo al mínimo (solo si está en batería)
listener {
    timeout = 30
    on-timeout = bash -c '[ "$(cat /sys/class/power_supply/AC*/online)" = "0" ] && brightnessctl -s set 5%'
    on-resume = bash -c '[ "$(cat /sys/class/power_supply/AC*/online)" = "0" ] && brightnessctl -r'
}

# 2min → apaga pantalla completamente (solo si está en batería)
listener {
    timeout = 120
    on-timeout = bash -c '[ "$(cat /sys/class/power_supply/AC*/online)" = "0" ] && hyprctl dispatch dpms off'
    on-resume = hyprctl dispatch dpms on
}

# 10min → bloquea siempre
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# 20min → suspende siempre
listener {
    timeout = 1200
    on-timeout = systemctl suspend
}
